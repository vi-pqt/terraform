# .pre-commit-config.yaml — runs on every git commit
repos:
  - repo: https:./github.com/antonbabenko/pre-commit-terraform
    rev: v1.100.0
    hooks:
      - id: terraform_fmt         # Auto-format
      - id: terraform_validate    # Syntax check
      - id: terraform_tflint      # Lint — catch typos
      - id: terraform_docs        # Update README
      - id: terraform_checkov     # Security scan